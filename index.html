<!DOCTYPE html>
<html>
<head>
<title>US Core Asset Dashboard</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}
table{
margin:auto;
border-collapse:collapse;
}
td,th{
border:1px solid #444;
padding:10px;
}
</style>
</head>

<body>

<h1>US Core Asset Dashboard</h1>

<table>
<tr>
<th>Ticker</th>
<th>Price</th>
</tr>

<tr><td>QQQ</td><td id="qqq"></td></tr>
<tr><td>AAPL</td><td id="aapl"></td></tr>
<tr><td>MSFT</td><td id="msft"></td></tr>
<tr><td>NVDA</td><td id="nvda"></td></tr>

</table>

<script>

async function load(){

const tickers=["QQQ","AAPL","MSFT","NVDA"]

for(let t of tickers){

let r=await fetch(
`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${t}`
)

let d=await r.json()

document.getElementById(t.toLowerCase()).innerText=
d.quoteResponse.result[0].regularMarketPrice

}

}

load()

</script>

</body>
</html>
